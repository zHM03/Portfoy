<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Benim Portföyüm</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background-color: #1e1e1e; /* koyu gri */
      color: #e0e0e0; /* açık gri */
    }

    header {
      background-color: #2c2c2c;
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #444;
    }

    header h1 {
      font-size: 24px;
    }

    nav a {
      margin-left: 20px;
      text-decoration: none;
      color: #e0e0e0;
      transition: color 0.3s;
    }

    nav a:hover {
      color: #00adb5;
    }

    .hero {
      padding: 80px 40px;
      text-align: center;
    }

    .hero h2 {
      font-size: 36px;
      margin-bottom: 20px;
    }

    .hero p {
      font-size: 18px;
      color: #aaa;
    }

    .projects {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      padding: 40px;
    }

    .project-card {
      background-color: #2c2c2c;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      transition: transform 0.3s;
    }

    .project-card:hover {
      transform: translateY(-5px);
    }

    .project-card h3 {
      margin-bottom: 10px;
      color: #00adb5;
    }

    footer {
      text-align: center;
      padding: 20px;
      background-color: #2c2c2c;
      border-top: 1px solid #444;
      color: #777;
    }
  </style>
</head>
<body>

  <header>
    <h1>HM Portföy</h1>
    <nav>
      <a href="#">Anasayfa</a>
      <a href="#">Projeler</a>
      <a href="#">Hakkımda</a>
      <a href="#">İletişim</a>
    </nav>
  </header>

  <section class="hero">
    <h2>Merhaba, Ben HM</h2>
    <p>Web geliştirici, tasarımcı ve teknoloji tutkunu.</p>
  </section>

  <section class="projects">
    <div class="project-card">
      <h3>Proje 1</h3>
      <p>Kısa proje açıklaması buraya gelecek.</p>
    </div>
    <div class="project-card">
      <h3>Proje 2</h3>
      <p>İkinci projeyi buraya tanıtabilirsin.</p>
    </div>
    <div class="project-card">
      <h3>Proje 3</h3>
      <p>Üçüncü projeni buraya ekle.</p>
    </div>
  </section>

  <footer>
    © 2025 HM. Tüm hakları saklıdır.
  </footer>

</body>
</html>
