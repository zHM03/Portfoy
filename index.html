<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HM Portföy</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background-color: #1e1e1e;
      color: #e0e0e0;
      line-height: 1.6;
    }

    header {
      background-color: #2c2c2c;
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #444;
      position: relative;
    }

    header h1 {
      font-size: 24px;
    }

    nav {
      display: flex;
      gap: 20px;
    }

    nav a {
      text-decoration: none;
      color: #e0e0e0;
      transition: color 0.3s;
    }

    nav a:hover {
      color: #00adb5;
    }

    .menu-toggle {
      display: none;
      flex-direction: column;
      cursor: pointer;
    }

    .menu-toggle span {
      width: 25px;
      height: 3px;
      background-color: #e0e0e0;
      margin: 4px 0;
      transition: 0.4s;
    }

    .hero {
      padding: 60px 20px;
      text-align: center;
    }

    .hero h2 {
      font-size: 32px;
      margin-bottom: 15px;
    }

    .hero p {
      font-size: 16px;
      color: #aaa;
    }

    .projects {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .project-card {
      background-color: #2c2c2c;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      transition: transform 0.3s;
    }

    .project-card:hover {
      transform: translateY(-5px);
    }

    .project-card h3 {
      margin-bottom: 10px;
      color: #00adb5;
    }

    footer {
      text-align: center;
      padding: 20px;
      background-color: #2c2c2c;
      border-top: 1px solid #444;
      color: #777;
    }

    /* Mobil için menüyü gizle */
    @media (max-width: 768px) {
      nav {
        display: none;
        flex-direction: column;
        position: absolute;
        top: 70px;
        right: 20px;
        background-color: #2c2c2c;
        padding: 10px;
        border-radius: 10px;
        z-index: 1000;
      }

      nav.show {
        display: flex;
      }

      .menu-toggle {
        display: flex;
      }
    }
  </style>
</head>
<body>

  <header>
    <h1>HM Portföy</h1>
    <div class="menu-toggle" id="menu-toggle">
      <span></span>
      <span></span>
      <span></span>
    </div>
    <nav id="nav">
      <a href="#">Anasayfa</a>
      <a href="#">Projeler</a>
      <a href="#">Hakkımda</a>
      <a href="#">İletişim</a>
    </nav>
  </header>

  <section class="hero">
    <h2>Merhaba, Ben HM</h2>
    <p>Web geliştirici, tasarımcı ve teknoloji tutkunu.</p>
  </section>

  <section class="projects">
    <div class="project-card">
      <h3>Proje 1</h3>
      <p>Kısa proje açıklaması buraya gelecek.</p>
    </div>
    <div class="project-card">
      <h3>Proje 2</h3>
      <p>İkinci projeyi buraya tanıtabilirsin.</p>
    </div>
    <div class="project-card">
      <h3>Proje 3</h3>
      <p>Üçüncü projeni buraya ekle.</p>
    </div>
  </section>

  <footer>
    © 2025 HM. Tüm hakları saklıdır.
  </footer>

  <script>
    const menuToggle = document.getElementById('menu-toggle');
    const nav = document.getElementById('nav');

    menuToggle.addEventListener('click', () => {
      nav.classList.toggle('show');
    });
  </script>

</body>
</html>
